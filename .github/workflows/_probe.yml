name: AF probe (temp)

on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsx worker/_afprobe.ts
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
